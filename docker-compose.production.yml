# =============================================================================
# Production stack PM-Task: Caddy (TLS + reverse proxy) + backend + Postgres.
#
# Запуск:
#   docker compose --env-file .env.production -f docker-compose.production.yml up -d
#
# Остановка:
#   docker compose --env-file .env.production -f docker-compose.production.yml down
#
# Просмотр логов бэка:
#   docker compose --env-file .env.production -f docker-compose.production.yml logs -f backend
# =============================================================================

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Данные БД переживают пересоздание контейнера. Volume именованный,
      # путь на хосте управляется Docker'ом (обычно /var/lib/docker/volumes/...).
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready возвращает 0, как только Postgres принимает подключения.
      # Бэкенд через depends_on.condition: service_healthy ждёт этот момент.
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      # На M1/M2 Mac первая инициализация БД занимает 15-25 секунд —
      # за это время healthcheck не считается failed.
      start_period: 30s
    # Биндим Postgres на loopback хоста (ТОЛЬКО 127.0.0.1, не наружу)
    # для отладки через SSH-туннель + Prisma Studio.
    # Без 127.0.0.1: Docker бы пробросил его на 0.0.0.0 в обход ufw.
    ports:
      - '127.0.0.1:5432:5432'

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    # env_file пробрасывает все переменные из .env.production внутрь контейнера.
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # DATABASE_URL внутри docker-сети ссылается на сервис `postgres`,
      # а не на localhost. Перетираем, что бы там ни было в .env.production.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    # Loopback-публикация для SSH-туннеля и локального дебага.
    # Наружу 5001 НЕ светит — снаружи только Caddy на 80/443.
    ports:
      - '127.0.0.1:${BACKEND_HOST_PORT:-5001}:5001'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
    # 80 и 443 наружу: единственные публичные порты VPS.
    # ufw на хосте пускает их (см. bootstrap-server.sh).
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3 (QUIC)
    volumes:
      # Конфиг (read-only)
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # TLS-сертификаты Let's Encrypt — Caddy их сам кладёт сюда и обновляет
      - caddy_data:/data
      # Внутренний state (Caddy admin API, кеш)
      - caddy_config:/config
      # Файлы access-логов (видны на хосте через docker volume inspect)
      - caddy_logs:/var/log/caddy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:2019/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  caddy_logs:
