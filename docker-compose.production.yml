# =============================================================================
# Production stack PM-Task: Caddy (TLS + reverse proxy) + backend + Postgres.
#
# Запуск:
#   docker compose --env-file .env.production -f docker-compose.production.yml up -d
#
# Остановка:
#   docker compose --env-file .env.production -f docker-compose.production.yml down
#
# Просмотр логов бэка:
#   docker compose --env-file .env.production -f docker-compose.production.yml logs -f backend
# =============================================================================

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Данные БД переживают пересоздание контейнера. Volume именованный,
      # путь на хосте управляется Docker'ом (обычно /var/lib/docker/volumes/...).
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # pg_isready возвращает 0, как только Postgres принимает подключения.
      # Бэкенд через depends_on.condition: service_healthy ждёт этот момент.
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
      # На M1/M2 Mac первая инициализация БД занимает 15-25 секунд —
      # за это время healthcheck не считается failed.
      start_period: 30s
    # Биндим Postgres на loopback хоста (ТОЛЬКО 127.0.0.1, не наружу)
    # для отладки через SSH-туннель + Prisma Studio.
    # Без 127.0.0.1: Docker бы пробросил его на 0.0.0.0 в обход ufw.
    ports:
      - '127.0.0.1:5432:5432'

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Redis наружу из VPS не светим вообще (даже на loopback) — он живёт
    # только в docker-сети и доступен только бэкенду по hostname `redis:6379`.
    # AOF-персистенс на случай рестарта (для кеша необязательно, но дёшево).
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # env_file пробрасывает все переменные из .env.production внутрь контейнера.
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      # DATABASE_URL и REDIS_URL внутри docker-сети ссылаются на сервисы
      # по их именам, а не на localhost. Перетираем .env.production.
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
    # Loopback-публикация для SSH-туннеля и локального дебага.
    # Наружу 5001 НЕ светит — снаружи только Caddy на 80/443.
    ports:
      - '127.0.0.1:${BACKEND_HOST_PORT:-5001}:5001'

  # ──────────────────────────────────────────────────────────────────
  # Стек логирования: Loki (хранилище) + Promtail (агент) + Grafana (UI)
  # ──────────────────────────────────────────────────────────────────
  #
  # Promtail читает docker-логи всех контейнеров (через bind-mount
  # /var/lib/docker/containers и docker.sock), парсит их (наш Pino —
  # JSON, остальные просто как text), отдаёт в Loki. Grafana ходит в
  # Loki и рисует дашборды + полнотекстовый поиск.
  #
  # Доступ к Grafana — через Caddy на grafana.spbu-pmi.ru с TLS.
  # Loki/Promtail снаружи не светим — они общаются только внутри
  # docker-сети. Grafana слушает на loopback.
  loki:
    image: grafana/loki:3.3.0
    restart: unless-stopped
    command: ['-config.file=/etc/loki/loki-config.yml']
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --spider http://localhost:3100/ready || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  promtail:
    image: grafana/promtail:3.3.0
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    command: ['-config.file=/etc/promtail/promtail-config.yml']
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Логи docker-контейнеров — readonly. Promtail только читает.
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Docker socket для discovery контейнеров и их labels.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persist position-файла, чтобы при рестарте не лить дубли.
      - promtail_data:/tmp

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    environment:
      # Логин по умолчанию admin, пароль из .env.production.
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD не задан в .env.production}
      # Запрет публичной регистрации — только admin.
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_USERS_ALLOW_ORG_CREATE: 'false'
      # Корректные ссылки в email/redirects через reverse-proxy Caddy.
      GF_SERVER_ROOT_URL: https://grafana.spbu-pmi.ru
      GF_SERVER_DOMAIN: grafana.spbu-pmi.ru
      # Анонимный доступ выключен — у дипломки нет публичных дашбордов.
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ['CMD-SHELL', 'wget --quiet --spider http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - backend
      - grafana
    # 80 и 443 наружу: единственные публичные порты VPS.
    # ufw на хосте пускает их (см. bootstrap-server.sh).
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3 (QUIC)
    volumes:
      # Конфиг (read-only)
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # TLS-сертификаты Let's Encrypt — Caddy их сам кладёт сюда и обновляет
      - caddy_data:/data
      # Внутренний state (Caddy admin API, кеш)
      - caddy_config:/config
      # Файлы access-логов (видны на хосте через docker volume inspect)
      - caddy_logs:/var/log/caddy
    healthcheck:
      # Проверяем, что Caddy обслуживает 80-й порт (HTTP→HTTPS редирект).
      # В alpine-образе нет curl, но есть wget из busybox.
      # Опция --spider запрашивает только заголовки. Любой 2xx/3xx — успех.
      test: ['CMD', 'wget', '--quiet', '--spider', 'http://localhost/']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  caddy_logs:
  loki_data:
  promtail_data:
  grafana_data:
