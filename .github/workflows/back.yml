name: Back CI

on:
  push:
    branches: [main]
    paths:
      - 'back/**'
      - '.github/workflows/back.yml'
  pull_request:
    paths:
      - 'back/**'
      - '.github/workflows/back.yml'

defaults:
  run:
    working-directory: back

jobs:
  test:
    name: Lint, typecheck, unit
    runs-on: ubuntu-latest

    env:
      # Заглушки для ConfigService — unit-тесты не ходят ни в БД, ни во внешние сервисы.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_dummy
      JWT_ACCESS_SECRET: ci-access
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci-refresh
      JWT_REFRESH_EXPIRES_IN: 30d
      JWT_REFRESH_EXPIRES_DAYS: '30'
      S3_ENDPOINT: http://localhost:9000
      S3_REGION: ru-central1
      S3_BUCKET: pmtask-ci
      S3_ACCESS_KEY: test
      S3_SECRET_KEY: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: back/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --ci --runInBand
