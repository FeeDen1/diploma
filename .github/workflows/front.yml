name: Front CI

on:
  push:
    branches: [main]
    paths:
      - 'front/**'
      - '.github/workflows/front.yml'
  pull_request:
    paths:
      - 'front/**'
      - '.github/workflows/front.yml'

defaults:
  run:
    working-directory: front

jobs:
  test:
    name: Lint, typecheck, unit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test:ci
