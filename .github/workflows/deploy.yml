name: Deploy to production

# Запускаемся только после того, как Back CI на main прошёл успешно.
# Это даёт безопасную цепочку: red lint → ничего не катится в прод.
#
# Альтернатива (push с paths-filter) была бы быстрее, но допускала бы
# деплой при упавшем CI — для дипломки это анти-паттерн.
on:
  workflow_run:
    workflows: ['Back CI']
    types: [completed]
    branches: [main]
  # Разрешаем ручной запуск из вкладки Actions — пригодится если деплой
  # нужно прокатить без правок кода (например, после обновления секретов).
  workflow_dispatch:

# Гарантируем, что два деплоя не выполнятся одновременно. cancel-in-progress=false:
# если уже катится — новый встаёт в очередь, не убивает текущий.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH deploy on VPS
    runs-on: ubuntu-latest
    # Стартуем только если CI прошёл успешно ИЛИ это ручной запуск.
    # github.event.workflow_run.conclusion для workflow_dispatch == null,
    # поэтому проверяем оба ветвления.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    # Защищённое окружение — даёт audit log в GitHub Environments
    # и возможность позже добавить required reviewers.
    environment:
      name: production
      url: https://api.spbu-pmi.ru/api/health

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # Тайм-аут с запасом: docker pull + build + миграции при первом
          # деплое могут занять 2-3 минуты, особенно если меняется image base.
          command_timeout: 10m
          script: |
            set -euo pipefail
            cd /opt/pmtask

            COMPOSE="docker compose --env-file .env.production -f docker-compose.production.yml"

            echo "▶ Обновляю код"
            git fetch origin main
            git reset --hard origin/main
            echo "  HEAD = $(git rev-parse --short HEAD)"

            echo "▶ docker compose up --build -d"
            $COMPOSE up --build -d

            # Проверяем готовность через curl на /api/health, а не через
            # docker inspect: имя контейнера зависит от имени compose-проекта
            # (на сервере оно "pmtask-backend-1", не "diploma-backend-1"),
            # поэтому полагаться на него хрупко. curl универсален и заодно
            # проверяет, что роутинг nest работает, а не только что контейнер
            # запустился.
            echo "▶ Smoke-test /api/health (до 90 сек)"
            for i in $(seq 1 18); do
              if curl --fail --silent http://localhost:5001/api/health > /dev/null; then
                echo "  health endpoint жив"
                exit 0
              fi
              if [ "$i" = "18" ]; then
                echo "  ✗ health endpoint не ответил за 90 сек"
                $COMPOSE logs --tail 50 backend
                exit 1
              fi
              sleep 5
            done
