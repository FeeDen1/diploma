# Auto-provisioning datasource для Grafana — при старте контейнера
# Loki сразу подключён, не надо тыкать «Add data source» в UI вручную.

apiVersion: 1

datasources:
  - name: Loki
    # Фиксированный UID — на него ссылаются дашборды в /var/lib/grafana/dashboards.
    # Без явного значения Grafana сгенерировала бы рандомный, и при пересоздании
    # контейнера старые дашборды переставали бы находить datasource.
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false # из UI не дать поправить — только через этот файл
    jsonData:
      # Лимит сколько строк Loki вернёт на один запрос. Дефолт 1000.
      maxLines: 5000
      # При клике по записи раскрывать все JSON-поля (Pino формат)
      derivedFields:
        - datasourceUid: ''
          matcherRegex: '"req":\{[^}]*"id":(\d+)'
          name: 'requestId'
          url: ''
