services:
  postgres:
    image: postgres:17
    container_name: diploma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: diploma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./back/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d diploma"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: