<?xml version="1.0" encoding="UTF-8"?>
<!--
  Adaptive-icon foreground для Android: 1024×1024, прозрачный фон.
  Внешние ~17% обрезаются маской системы (круг/квадрат/squircle —
  зависит от лаунчера). PM сидит в safe zone 432×432 в центре.
  Background задаётся как сплошной цвет в app.json.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <text x="512" y="600" font-size="380" font-weight="700" fill="white"
        text-anchor="middle" letter-spacing="-13"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif">PM</text>
</svg>
