<?xml version="1.0" encoding="UTF-8"?>
<!--
  App icon 1024×1024 для iOS/Android. Плоский квадрат —
  iOS сама обрежет до закруглённых углов, Android тоже.
  Меняешь PM/цвет здесь → npm run gen:icons → новые PNG.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <rect width="1024" height="1024" fill="#5856D6"/>
  <text x="512" y="630" font-size="520" font-weight="700" fill="white"
        text-anchor="middle" letter-spacing="-18"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif">PM</text>
</svg>
