<?xml version="1.0" encoding="UTF-8"?>
<!--
  Splash логотип. Прозрачный фон — Expo подкладывает backgroundColor.
  Должен быть квадратный, центрируется на splash-screen.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <text x="400" y="500" font-size="380" font-weight="700" fill="white"
        text-anchor="middle" letter-spacing="-13"
        font-family="Helvetica Neue, Helvetica, Arial, sans-serif">PM</text>
</svg>
